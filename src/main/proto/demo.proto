syntax = "proto3";

package just.demo.proto;
option java_multiple_files = true;

service UnaryDemoService {
    rpc Demo (DemoRequest) returns (DemoResponse);
}

service ServerStreamDemoService {
    rpc Demo (DemoRequest) returns (stream DemoResponse);
}

service BidirectionalStreamDemoService {
    rpc Demo (stream DemoRequest) returns (stream DemoResponse);
}

message DemoRequest {
    string text = 1;
}

message DemoResponse {
    string text = 1;
}
